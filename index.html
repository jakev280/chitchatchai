<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chit Chat Chai</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <header class="sticky-header">
    <div class="header-content">
      <img src="images/ccc-logo.png" alt="Chit Chat Chai Logo" class="header-logo-circle">
      <p class="header-tagline">
        Creating connection, confidence, and community
        <span class="tagline-break">one cup of tea at a time!</span>
      </p>
      <div class="event-details">
        <span class="detail-item"><strong>📅 Mon:</strong> 9.30am–11am</span>
        <span class="detail-item"><strong>📍 St Margarets Centre</strong></span>
      </div>
    </div>
  </header>

  <img src="images/2022-2.png" alt="Chit Chat Chai 2021 Session" class="header-main-img">

  <div id="introduction-placeholder"></div>

  <div class="scrapbook-pile">
    
    <figure class="polaroid">
      <img src="images/2026-1.jpeg" alt="Chit Chat Chai 2026 session" loading="lazy">
      <figcaption class="polaroid-caption">Our Wonderful Volunteers </figcaption>
    </figure>

    <figure class="polaroid">
      <img src="images/2026-2.jpeg" alt="Chit Chat Chai 2026 activity" loading="lazy">
      <figcaption class="polaroid-caption">Decorating our Easter Eggs</figcaption>
    </figure>

    <figure class="polaroid">
      <img src="images/2026-3.jpeg" alt="Chit Chat Chai 2026 community event" loading="lazy">
      <figcaption class="polaroid-caption">Celebrating Eid 🥳</figcaption>
    </figure>

  </div>

  <div id="through-the-years-placeholder"></div>
  <div id="volunteers-placeholder"></div>
  <div id="community-connections-placeholder"></div> 
  <div id="funders-placeholder"></div>
  <div id="past-funders-placeholder"></div>
  <div id="interactive-placeholder"></div>

<footer class="main-footer">
    <div class="footer-content">
        <p>Developed by <strong>Jake Virdee-Reynolds</strong> & <strong>Jason Akrong</strong></p>
        <p>&copy; 2026 ChitChatChai – Community initiative</p>
        <p>Unincorporated Association</p>
    </div>
</footer>

</body>
</html>
